<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patidar Travels - Archery Booking</title>
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #0f0c29; background: linear-gradient(to bottom, #24243e, #0f0c29); color: white; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .game-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); width: 100%; max-width: 400px; border-radius: 25px; border: 2px solid #ff00c1; overflow: hidden; box-shadow: 0 0 20px #ff00c1; }
        
        /* Gaming Header with your Bow and Target */
        .header-assets { display: flex; justify-content: space-around; align-items: center; padding: 20px; background: rgba(0,0,0,0.3); }
        .header-assets img { height: 60px; width: auto; }
        
        .content { padding: 20px; }
        h2 { text-align: center; color: #00d2ff; text-transform: uppercase; margin: 0; font-size: 20px; text-shadow: 0 0 10px #00d2ff; }
        .tagline { text-align: center; color: #ff00c1; font-size: 11px; margin-bottom: 20px; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #00d2ff; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid #ff00c1; border-radius: 10px; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .row { display: flex; gap: 8px; }
        .btn-book { background: linear-gradient(45deg, #ff00c1, #00d2ff); color: white; width: 100%; border: none; padding: 16px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255, 0, 193, 0.4); }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header-assets">
        <img src="bow.png" alt="Bow">
        <img src="target.jpg" alt="Target" style="border-radius: 50%;">
    </div>

    <div class="content">
        <h2>Patidar Tour & Travels</h2>
        <p class="tagline">SCAN • PLAY • TRAVEL</p>
        
        <div class="input-group">
            <label>PLAYER / CUSTOMER NAME</label>
            <input type="text" id="pName" placeholder="Enter Name">
        </div>

        <div class="row">
            <div class="input-group" style="flex:1.5;">
                <label>MOBILE NO.</label>
                <input type="tel" id="pMob" placeholder="Contact">
            </div>
            <div class="input-group" style="flex:1;">
                <label>SAWARI</label>
                <input type="number" id="pQty" value="1">
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="flex:1;">
                <label>FROM</label>
                <input type="text" id="pFrom" placeholder="Source">
            </div>
            <div class="input-group" style="flex:1;">
                <label>TO</label>
                <input type="text" id="pTo" placeholder="Destination">
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="flex:1;">
                <label>PICKUP DATE</label>
                <input type="date" id="pDate">
            </div>
            <div class="input-group" style="flex:1;">
                <label>PICKUP TIME</label>
                <input type="time" id="pTime">
            </div>
        </div>

        <button class="btn-book" onclick="sendBooking()">Confirm Booking</button>
    </div>
</div>

<script>
    function sendBooking() {
        var n = document.getElementById('pName').value;
        var m = document.getElementById('pMob').value;
        var q = document.getElementById('pQty').value;
        var f = document.getElementById('pFrom').value;
        var t = document.getElementById('pTo').value;
        var d = document.getElementById('pDate').value;
        var tm = document.getElementById('pTime').value;

        if(!n || !m || !f || !t || !d || !tm) {
            alert("Bhai, sari details bharna zaruri hai!");
            return;
        }

        var wpNumber = "916264296197"; 

        var message = "🎯 *Patidar Travels - Archery Booking* 🎯\n" + 
                      "━━━━━━━━━━━━━━━━━━━\n" + 
                      "👤 *Player:* " + n + "\n" + 
                      "📞 *Mobile:* " + m + "\n" + 
                      "👥 *Sawari:* " + q + "\n" + 
                      "📍 *Pickup:* " + f + "\n" + 
                      "🏁 *Drop:* " + t + "\n" + 
                      "📅 *Date:* " + d + "\n" + 
                      "⏰ *Pickup Time:* " + tm + "\n" + 
                      "━━━━━━━━━━━━━━━━━━━\n" + 
                      "Sent from Luck Scan Web.";

        window.location.href = "https://api.whatsapp.com/send?phone=" + wpNumber + "&text=" + encodeURIComponent(message);
    }
</script>

</body>
  </html>
