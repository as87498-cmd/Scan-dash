<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan-Dash | Patidar Travels</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000428; background: linear-gradient(to bottom, #004e92, #000428); color: white; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .dash-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); width: 100%; max-width: 400px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: auto; }
        
        /* Header Image Section */
        .header-box { width: 100%; background: #fff; padding: 10px 0; text-align: center; }
        .header-box img { max-width: 80%; height: auto; display: inline-block; }

        .form-body { padding: 25px; }
        h2 { text-align: center; color: #00d2ff; text-transform: uppercase; margin: 0; font-size: 22px; letter-spacing: 1px; }
        .tagline { text-align: center; color: #aaa; font-size: 12px; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #00d2ff; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #00d2ff; background: rgba(255, 255, 255, 0.15); }
        
        .row { display: flex; gap: 10px; }
        .btn-dash { background: #00d2ff; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; width: 100%; border: none; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }
        .btn-dash:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="dash-card">
    <div class="header-box">
        <img src="poster.png" alt="Patidar Travels" onerror="this.parentElement.style.display='none'">
    </div>

    <div class="form-body">
        <h2>Patidar Travels</h2>
        <p class="tagline">SCAN-DASH | Fast Booking System</p>
        
        <div class="input-group">
            <label>Customer Name</label>
            <input type="text" id="name" placeholder="Enter Full Name">
        </div>

        <div class="row">
            <div class="input-group" style="flex:1.5;">
                <label>WhatsApp No.</label>
                <input type="tel" id="mob" placeholder="Contact No.">
            </div>
            <div class="input-group" style="flex:1;">
                <label>Sawari</label>
                <input type="number" id="qty" value="1" min="1">
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="flex:1;">
                <label>From</label>
                <input type="text" id="from" placeholder="Pickup City">
            </div>
            <div class="input-group" style="flex:1;">
                <label>To</label>
                <input type="text" id="to" placeholder="Destination">
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="flex:1;">
                <label>Pickup Date</label>
                <input type="date" id="date">
            </div>
            <div class="input-group" style="flex:1;">
                <label>Pickup Time</label>
                <input type="time" id="time">
            </div>
        </div>

        <button class="btn-dash" onclick="sendToWhatsApp()">Dash to WhatsApp</button>
    </div>
</div>

<script>
    function sendToWhatsApp() {
        const n = document.getElementById('name').value;
        const m = document.getElementById('mob').value;
        const q = document.getElementById('qty').value;
        const f = document.getElementById('from').value;
        const t = document.getElementById('to').value;
        const d = document.getElementById('date').value;
        const tm = document.getElementById('time').value;

        if(!n || !m || !f || !t || !d || !tm) {
            alert("Bhai, sari details bharo!");
            return;
        }

        const wpNumber = "916264296197"; 

        const message = `*PATIDAR TRAVELS - SCAN DASH BOOKING*%0A` +
                        `━━━━━━━━━━━━━━━━━━━%0A` +
                        `👤 *Name:* ${n}%0A` +
                        `📞 *Contact:* ${m}%0A` +
                        `👥 *Sawari:* ${q}%0A` +
                        `📍 *From:* ${f}%0A` +
                        `🏁 *To:* ${t}%0A` +
                        `📅 *Pickup Date:* ${d}%0A` +
                        `⏰ *Pickup Time:* ${tm}%0A` +
                        `━━━━━━━━━━━━━━━━━━━%0A` +
                        `Kindly confirm this booking via Scan-Dash.`;

        window.location.href = `https://api.whatsapp.com/send?phone=${wpNumber}&text=${message}`;
    }
</script>

</body>
</html>
