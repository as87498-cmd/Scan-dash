<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivay Finance - Lucky Loop</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; margin: 0; text-align: center; overflow-x: hidden; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .active { display: block; }

        /* Posters */
        .poster { width: 100%; max-width: 350px; border-radius: 15px; border: 2px solid #ffbc00; box-shadow: 0 0 20px #ffbc00; }
        
        /* Wheel CSS */
        #wheel-container { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; transition: transform 4s cubic-bezier(0.17, 0.67, 0.1, 0.99); }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; z-index: 10; }

        .btn { background: #ffbc00; color: #000; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(255,188,0,0.4); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="screen1" class="screen active">
        <img src="poster1.jpg" class="poster" alt="Shivay Finance Intro">
        <h1>Welcome to Lucky Loop</h1>
        <p>Shivay Finance: Loans & Insurance</p>
        <button class="btn" onclick="nextScreen(2)">Start Game</button>
    </div>

    <div id="screen2" class="screen">
        <h2>Spin & Win Discount!</h2>
        <div id="wheel-container">
            <img id="pointer" src="https://cdn-icons-png.flaticon.com/512/8066/8066267.png">
            <img id="wheel" src="https://i.imgur.com/v88863p.png"> </div>
        <button class="btn" id="spinBtn" onclick="spinWheel()">SPIN NOW</button>
    </div>

    <div id="screen3" class="screen">
        <img src="poster2.jpg" class="poster">
        <h3>Processing your Reward...</h3>
        <p>Did you know? Shivay Finance offers 0% Processing Fee on Home Loans!</p>
        <div id="loading-bar" style="width: 80%; height: 10px; background: #333; margin: 20px auto; border-radius: 5px;">
            <div id="progress" style="width: 0%; height: 100%; background: #ffbc00; border-radius: 5px; transition: 3s;"></div>
        </div>
    </div>

    <div id="screen4" class="screen">
        <h1 style="color: #ffbc00;">Congratulations!</h1>
        <div style="border: 2px dashed #fff; padding: 20px; margin: 20px auto; width: 80%;">
            <h2 id="rewardText">10% Discount</h2>
            <p>On Insurance Premium</p>
        </div>
        <input type="text" id="userName" placeholder="Apna Naam" style="padding: 10px; width: 80%; border-radius: 5px; border: none;"><br>
        <button class="btn" onclick="sendToWhatsApp()">Claim on WhatsApp</button>
    </div>

    <script>
        let currentRotation = 0;
        let selectedReward = "";

        function nextScreen(scr) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + scr).classList.add('active');
        }

        function spinWheel() {
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;

            const extraDeg = Math.floor(Math.random() * 360) + 3600; // 10 spins
            currentRotation += extraDeg;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Rewards logic based on degree
            const rewards = ["5% Off", "10% Off", "Gift Voucher", "Flat 500 Off", "Try Again", "15% Off"];
            selectedReward = rewards[Math.floor(Math.random() * rewards.length)];

            setTimeout(() => {
                nextScreen(3);
                document.getElementById('progress').style.width = "100%";
                setTimeout(() => {
                    document.getElementById('rewardText').innerText = selectedReward;
                    nextScreen(4);
                }, 3000);
            }, 4500);
        }

        function sendToWhatsApp() {
            const name = document.getElementById('userName').value;
            if(!name) { alert("Naam toh likho bhai!"); return; }
            
            const wpNumber = "916264296197";
            const message = `*Shivay Finance - Lucky Loop Reward*%0A` +
                            `━━━━━━━━━━━━━━━━━━━%0A` +
                            `👤 *Name:* ${name}%0A` +
                            `🎁 *Reward Won:* ${selectedReward}%0A` +
                            `━━━━━━━━━━━━━━━━━━━%0A` +
                            `Please activate my coupon!`;

            window.location.href = `https://api.whatsapp.com/send?phone=${wpNumber}&text=${message}`;
        }
    </script>
</body>
</html>
